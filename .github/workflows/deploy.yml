name: Deploy Kolekta Backend(Demo)

on:
  push:
    branches:
      - demo 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # If your VPS uses a non-standard port, uncomment the line below:
          # port: ${{ secrets.PORT }}
          script: |
            # Navigate to your project folder
            cd /var/www/kolekta-backend-demo
            
            # Pull the latest changes from GitHub
            git pull origin demo
            
            # Install only production dependencies to keep the VPS light
            npm install --production
            
            # Inject the VPS-specific credentials
            # This overwrites the .env file with your GitHub Secret values
            echo "${{ secrets.ENV_CONTENTS_DEMO }}" > .env
            
            # Restart your application (using PM2 is highly recommended)
            pm2 reload kolekta-demo || pm2 start app.js --name "kolekta-demo"